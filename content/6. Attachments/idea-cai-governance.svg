<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="500" rx="16" fill="#ffffff"/>

  <text x="450" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">CAI Pattern for IT Governance Evaluation</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-size="12">Constitutional AI approach applied to Target Model QA</text>

  <!-- Left: CAI Original -->
  <rect x="30" y="85" width="400" height="190" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="230" y="112" text-anchor="middle" fill="#15803d" font-size="14" font-weight="700">Constitutional AI (Original)</text>

  <rect x="50" y="130" width="110" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="105" y="155" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">Constitution</text>

  <line x1="160" y1="150" x2="178" y2="150" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="178,150 168,144 168,156" fill="#22c55e"/>

  <rect x="180" y="130" width="110" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="235" y="155" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">Self-Critique</text>

  <line x1="290" y1="150" x2="308" y2="150" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="308,150 298,144 298,156" fill="#22c55e"/>

  <rect x="310" y="130" width="100" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="360" y="155" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">Revision</text>

  <text x="230" y="200" text-anchor="middle" fill="#64748b" font-size="11">23,000 words constitution</text>
  <text x="230" y="218" text-anchor="middle" fill="#64748b" font-size="11">AI evaluates own output</text>
  <text x="230" y="236" text-anchor="middle" fill="#64748b" font-size="11">Scalable Oversight</text>

  <!-- Arrow between -->
  <text x="450" y="178" text-anchor="middle" fill="#94a3b8" font-size="24">~</text>
  <text x="450" y="200" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">pattern</text>
  <text x="450" y="214" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">transfer</text>

  <!-- Right: IT Governance Application -->
  <rect x="470" y="85" width="400" height="190" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="670" y="112" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="700">IT Governance Evaluation</text>

  <rect x="490" y="130" width="110" height="40" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="545" y="148" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">EA Principles</text>
  <text x="545" y="162" text-anchor="middle" fill="#3b82f6" font-size="8">TOGAF / client IT</text>

  <line x1="600" y1="150" x2="618" y2="150" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="618,150 608,144 608,156" fill="#3b82f6"/>

  <rect x="620" y="130" width="110" height="40" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="675" y="148" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">Auto Review</text>
  <text x="675" y="162" text-anchor="middle" fill="#3b82f6" font-size="8">LLM self-check</text>

  <line x1="730" y1="150" x2="748" y2="150" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="748,150 738,144 738,156" fill="#3b82f6"/>

  <rect x="750" y="130" width="100" height="40" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="800" y="155" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">Refinement</text>

  <text x="670" y="200" text-anchor="middle" fill="#64748b" font-size="11">IT strategy principles as constitution</text>
  <text x="670" y="218" text-anchor="middle" fill="#64748b" font-size="11">LLM evaluates target model draft</text>
  <text x="670" y="236" text-anchor="middle" fill="#64748b" font-size="11">Quality gate before consultant review</text>

  <!-- Bottom: Workflow -->
  <rect x="30" y="310" width="840" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="335" text-anchor="middle" fill="#334155" font-size="13" font-weight="700">Target Model QA Workflow</text>

  <rect x="50" y="350" width="120" height="30" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="110" y="370" text-anchor="middle" fill="#92400e" font-size="10">LLM Draft</text>

  <line x1="170" y1="365" x2="198" y2="365" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="198,365 188,359 188,371" fill="#64748b"/>

  <rect x="200" y="350" width="140" height="30" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="270" y="370" text-anchor="middle" fill="#1e40af" font-size="10">Principle Check</text>

  <line x1="340" y1="365" x2="368" y2="365" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="368,365 358,359 358,371" fill="#64748b"/>

  <rect x="370" y="350" width="120" height="30" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="430" y="370" text-anchor="middle" fill="#166534" font-size="10">Auto Revision</text>

  <line x1="490" y1="365" x2="518" y2="365" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="518,365 508,359 508,371" fill="#64748b"/>

  <rect x="520" y="350" width="140" height="30" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="590" y="370" text-anchor="middle" fill="#7e22ce" font-size="10" font-weight="600">Consultant Review</text>

  <line x1="660" y1="365" x2="688" y2="365" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="688,365 678,359 678,371" fill="#64748b"/>

  <rect x="690" y="350" width="160" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="770" y="370" text-anchor="middle" fill="#15803d" font-size="10" font-weight="600">Final Deliverable</text>

  <!-- Bottom: Example Principles -->
  <text x="450" y="425" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Example: IT Constitution (EA Principles)</text>

  <rect x="50" y="440" width="200" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="150" y="462" text-anchor="middle" fill="#475569" font-size="10">Reuse over Build</text>

  <rect x="270" y="440" width="200" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="370" y="462" text-anchor="middle" fill="#475569" font-size="10">Cloud-First Strategy</text>

  <rect x="490" y="440" width="200" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="590" y="462" text-anchor="middle" fill="#475569" font-size="10">Data Governance Compliance</text>

  <rect x="710" y="440" width="160" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="790" y="462" text-anchor="middle" fill="#475569" font-size="10">Security by Design</text>
</svg>
