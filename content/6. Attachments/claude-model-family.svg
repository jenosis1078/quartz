<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 700" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="940" height="700" rx="16" fill="#ffffff"/>

  <!-- Title -->
  <text x="470" y="42" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700">Claude Model Family Evolution</text>
  <text x="470" y="65" text-anchor="middle" fill="#64748b" font-size="13">2023 — 2026 | Haiku · Sonnet · Opus</text>

  <!-- Column Headers -->
  <text x="180" y="105" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="600">HAIKU (경량·속도)</text>
  <text x="470" y="105" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">SONNET (균형)</text>
  <text x="760" y="105" text-anchor="middle" fill="#9333ea" font-size="12" font-weight="600">OPUS (최고 성능)</text>

  <!-- Vertical guide lines -->
  <line x1="180" y1="115" x2="180" y2="665" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4"/>
  <line x1="470" y1="115" x2="470" y2="665" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4"/>
  <line x1="760" y1="115" x2="760" y2="665" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4"/>

  <!-- ===== Row 1: Claude 1/2 Era (2023) ===== -->
  <text x="30" y="150" fill="#94a3b8" font-size="11" font-weight="600" transform="rotate(-90, 30, 150)">2023</text>
  <rect x="345" y="125" width="250" height="55" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="148" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">Claude 1 → 2 → 2.1</text>
  <text x="470" y="168" text-anchor="middle" fill="#64748b" font-size="11">단일 모델 | 100K → 200K ctx</text>

  <!-- ===== Row 2: Claude 3 (Mar 2024) ===== -->
  <text x="30" y="240" fill="#94a3b8" font-size="11" font-weight="600" transform="rotate(-90, 30, 240)">2024.03</text>
  <!-- Haiku 3 -->
  <rect x="80" y="205" width="200" height="70" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="180" y="230" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="600">Haiku 3</text>
  <text x="180" y="248" text-anchor="middle" fill="#64748b" font-size="10">200K ctx | $0.25 / $1.25</text>
  <text x="180" y="263" text-anchor="middle" fill="#94a3b8" font-size="9">빠른 응답, 경량 작업</text>
  <!-- Sonnet 3 -->
  <rect x="370" y="205" width="200" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="470" y="230" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">Sonnet 3</text>
  <text x="470" y="248" text-anchor="middle" fill="#64748b" font-size="10">200K ctx | $3 / $15</text>
  <text x="470" y="263" text-anchor="middle" fill="#94a3b8" font-size="9">균형잡힌 범용 모델</text>
  <!-- Opus 3 -->
  <rect x="660" y="205" width="200" height="70" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="760" y="230" text-anchor="middle" fill="#7e22ce" font-size="13" font-weight="600">Opus 3</text>
  <text x="760" y="248" text-anchor="middle" fill="#64748b" font-size="10">200K ctx | $15 / $75</text>
  <text x="760" y="263" text-anchor="middle" fill="#94a3b8" font-size="9">최초 3-tier 시스템 도입</text>

  <!-- ===== Row 3: Claude 3.5 (Jun-Oct 2024) ===== -->
  <text x="30" y="340" fill="#94a3b8" font-size="11" font-weight="600" transform="rotate(-90, 30, 340)">2024.06~10</text>
  <!-- Haiku 3.5 -->
  <rect x="80" y="305" width="200" height="70" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="180" y="330" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="600">Haiku 3.5</text>
  <text x="180" y="348" text-anchor="middle" fill="#64748b" font-size="10">200K ctx | $1 / $5</text>
  <text x="180" y="363" text-anchor="middle" fill="#94a3b8" font-size="9">Oct 2024 출시</text>
  <!-- Sonnet 3.5 v1/v2 -->
  <rect x="370" y="305" width="200" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="470" y="330" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">Sonnet 3.5 (v1/v2)</text>
  <text x="470" y="348" text-anchor="middle" fill="#64748b" font-size="10">200K ctx | $3 / $15</text>
  <text x="470" y="363" text-anchor="middle" fill="#b45309" font-size="9">v2: Computer Use 최초 도입</text>

  <!-- ===== Row 4: Claude 3.7 + 4 (2025) ===== -->
  <text x="30" y="440" fill="#94a3b8" font-size="11" font-weight="600" transform="rotate(-90, 30, 440)">2025</text>
  <!-- Sonnet 3.7 -->
  <rect x="370" y="400" width="200" height="55" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="470" y="423" text-anchor="middle" fill="#0e7490" font-size="13" font-weight="600">Sonnet 3.7</text>
  <text x="470" y="440" text-anchor="middle" fill="#b45309" font-size="9">Feb — Extended Thinking 최초 도입</text>
  <!-- Sonnet 4 -->
  <rect x="370" y="465" width="200" height="55" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="470" y="488" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">Sonnet 4</text>
  <text x="470" y="505" text-anchor="middle" fill="#64748b" font-size="10">May | 200K ctx | $3 / $15</text>
  <!-- Opus 4 -->
  <rect x="660" y="465" width="200" height="55" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="760" y="488" text-anchor="middle" fill="#7e22ce" font-size="13" font-weight="600">Opus 4</text>
  <text x="760" y="505" text-anchor="middle" fill="#64748b" font-size="10">May | 200K ctx | $15 / $75</text>

  <!-- ===== Row 5: Claude 4.5 (Nov 2025) ===== -->
  <text x="30" y="555" fill="#94a3b8" font-size="11" font-weight="600" transform="rotate(-90, 30, 555)">2025.11</text>
  <!-- Haiku 4.5 -->
  <rect x="80" y="535" width="200" height="55" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="180" y="558" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="600">Haiku 4.5</text>
  <text x="180" y="575" text-anchor="middle" fill="#64748b" font-size="10">200K ctx | $1 / $5</text>
  <!-- Sonnet 4.5 -->
  <rect x="370" y="535" width="200" height="55" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="470" y="558" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">Sonnet 4.5</text>
  <text x="470" y="575" text-anchor="middle" fill="#64748b" font-size="10">200K / 1M(β) | $3 / $15</text>
  <!-- Opus 4.5 -->
  <rect x="660" y="535" width="200" height="55" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="760" y="558" text-anchor="middle" fill="#7e22ce" font-size="13" font-weight="600">Opus 4.5</text>
  <text x="760" y="575" text-anchor="middle" fill="#64748b" font-size="10">200K ctx | $5 / $25</text>

  <!-- ===== Row 6: Claude 4.6 (Feb 2026) — Current ===== -->
  <text x="30" y="640" fill="#94a3b8" font-size="11" font-weight="600" transform="rotate(-90, 30, 640)">2026.02</text>
  <!-- Sonnet 4.6 -->
  <rect x="370" y="610" width="200" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="470" y="633" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="700">Sonnet 4.6</text>
  <text x="470" y="651" text-anchor="middle" fill="#1d4ed8" font-size="10">1M ctx | 64K out | $3 / $15</text>
  <circle cx="575" cy="618" r="5" fill="#0891b2"/>
  <!-- Opus 4.6 -->
  <rect x="660" y="610" width="200" height="60" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="760" y="633" text-anchor="middle" fill="#581c87" font-size="13" font-weight="700">Opus 4.6</text>
  <text x="760" y="651" text-anchor="middle" fill="#7e22ce" font-size="10">1M ctx | 128K out | $5 / $25</text>
  <circle cx="865" cy="618" r="5" fill="#0891b2"/>

  <!-- Current indicator -->
  <text x="905" y="622" fill="#0891b2" font-size="9" font-weight="600">LATEST</text>

  <!-- Legend -->
  <rect x="60" y="610" width="250" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="632" fill="#475569" font-size="10" font-weight="600">KEY MILESTONES</text>
  <circle cx="80" cy="648" r="4" fill="#d97706"/>
  <text x="90" y="652" fill="#64748b" font-size="10">Computer Use (3.5v2) → Extended Thinking (3.7) → 1M ctx (4.6)</text>
</svg>
