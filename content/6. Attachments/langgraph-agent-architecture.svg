<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="1100" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">LangGraph AI 에이전트 아키텍처</text>
  <text x="450" y="70" text-anchor="middle" font-size="13" fill="#888">태양광 패널 에너지 절감액 계산 에이전트 · 8단계 구현</text>

  <!-- ── Step boxes ── -->

  <!-- Step 1 -->
  <rect x="60" y="95" width="360" height="80" rx="10" fill="#1e2433" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="95" width="8" height="80" rx="4" fill="#3b82f6"/>
  <text x="82" y="126" font-size="11" fill="#3b82f6" font-weight="bold">STEP 1</text>
  <text x="82" y="146" font-size="14" font-weight="bold" fill="#e2e8f0">라이브러리 임포트</text>
  <text x="82" y="164" font-size="11" fill="#94a3b8">LangChain · LangGraph · boto3 · AWS Bedrock</text>

  <!-- Step 2 -->
  <rect x="480" y="95" width="360" height="80" rx="10" fill="#1e2433" stroke="#10b981" stroke-width="1.5"/>
  <rect x="480" y="95" width="8" height="80" rx="4" fill="#10b981"/>
  <text x="502" y="126" font-size="11" fill="#10b981" font-weight="bold">STEP 2</text>
  <text x="502" y="146" font-size="14" font-weight="bold" fill="#e2e8f0">도구 정의 (compute_savings)</text>
  <text x="502" y="164" font-size="11" fill="#94a3b8">월별 전기요금 → 패널 수 · 설치비 · 10년 절감액 계산</text>

  <!-- Arrow 1→2 -->
  <line x1="420" y1="135" x2="478" y2="135" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="60" y="225" width="360" height="80" rx="10" fill="#1e2433" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="60" y="225" width="8" height="80" rx="4" fill="#f59e0b"/>
  <text x="82" y="256" font-size="11" fill="#f59e0b" font-weight="bold">STEP 3</text>
  <text x="82" y="276" font-size="14" font-weight="bold" fill="#e2e8f0">오류 처리 설정</text>
  <text x="82" y="294" font-size="11" fill="#94a3b8">handle_tool_error · create_tool_node_with_fallback</text>

  <!-- Step 4 -->
  <rect x="480" y="225" width="360" height="80" rx="10" fill="#1e2433" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="480" y="225" width="8" height="80" rx="4" fill="#8b5cf6"/>
  <text x="502" y="256" font-size="11" fill="#8b5cf6" font-weight="bold">STEP 4</text>
  <text x="502" y="276" font-size="14" font-weight="bold" fill="#e2e8f0">State &amp; Assistant 클래스</text>
  <text x="502" y="294" font-size="11" fill="#94a3b8">TypedDict State · Runnable 루프 · 유효 응답까지 재시도</text>

  <!-- Vertical arrows 1→3, 2→4 -->
  <line x1="240" y1="175" x2="240" y2="223" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="175" x2="660" y2="223" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow 3→4 -->
  <line x1="420" y1="265" x2="478" y2="265" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="60" y="355" width="360" height="80" rx="10" fill="#1e2433" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="60" y="355" width="8" height="80" rx="4" fill="#ec4899"/>
  <text x="82" y="386" font-size="11" fill="#ec4899" font-weight="bold">STEP 5</text>
  <text x="82" y="406" font-size="14" font-weight="bold" fill="#e2e8f0">LLM 설정 (AWS Bedrock)</text>
  <text x="82" y="424" font-size="11" fill="#94a3b8">claude-3-sonnet · boto3 · temperature=0</text>

  <!-- Step 6 -->
  <rect x="480" y="355" width="360" height="80" rx="10" fill="#1e2433" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="480" y="355" width="8" height="80" rx="4" fill="#06b6d4"/>
  <text x="502" y="386" font-size="11" fill="#06b6d4" font-weight="bold">STEP 6</text>
  <text x="502" y="406" font-size="14" font-weight="bold" fill="#e2e8f0">워크플로우 정의</text>
  <text x="502" y="424" font-size="11" fill="#94a3b8">ChatPromptTemplate · system 메시지 · llm.bind_tools()</text>

  <!-- Vertical arrows 3→5, 4→6 -->
  <line x1="240" y1="305" x2="240" y2="353" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="305" x2="660" y2="353" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow 5→6 -->
  <line x1="420" y1="395" x2="478" y2="395" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7 - Full width -->
  <rect x="60" y="490" width="780" height="90" rx="10" fill="#1a2035" stroke="#f97316" stroke-width="2"/>
  <rect x="60" y="490" width="8" height="90" rx="4" fill="#f97316"/>
  <text x="82" y="521" font-size="11" fill="#f97316" font-weight="bold">STEP 7</text>
  <text x="82" y="543" font-size="15" font-weight="bold" fill="#e2e8f0">그래프 구조 구축 (StateGraph)</text>
  <text x="82" y="562" font-size="11" fill="#94a3b8">add_node(assistant) · add_node(tools) · add_edge(START→assistant) · add_conditional_edges · MemorySaver</text>

  <!-- Arrows 5,6 → 7 -->
  <line x1="240" y1="435" x2="240" y2="488" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="435" x2="660" y2="488" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 8 - Full width -->
  <rect x="60" y="640" width="780" height="80" rx="10" fill="#1a2035" stroke="#22c55e" stroke-width="2"/>
  <rect x="60" y="640" width="8" height="80" rx="4" fill="#22c55e"/>
  <text x="82" y="671" font-size="11" fill="#22c55e" font-weight="bold">STEP 8</text>
  <text x="82" y="691" font-size="15" font-weight="bold" fill="#e2e8f0">에이전트 실행</text>
  <text x="82" y="710" font-size="11" fill="#94a3b8">graph.stream() · thread_id · MemorySaver로 다단계 대화 컨텍스트 유지</text>

  <!-- Arrow 7→8 -->
  <line x1="450" y1="580" x2="450" y2="638" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Runtime Flow Diagram ── -->
  <text x="450" y="772" text-anchor="middle" font-size="14" font-weight="bold" fill="#cbd5e1">런타임 실행 흐름</text>

  <!-- Flow nodes -->
  <!-- User -->
  <rect x="60" y="790" width="120" height="50" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="120" y="811" text-anchor="middle" font-size="11" fill="#94a3b8">사용자 입력</text>
  <text x="120" y="828" text-anchor="middle" font-size="11" fill="#e2e8f0" font-weight="bold">User</text>

  <!-- State -->
  <rect x="230" y="790" width="120" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="290" y="811" text-anchor="middle" font-size="11" fill="#8b5cf6">State</text>
  <text x="290" y="828" text-anchor="middle" font-size="11" fill="#e2e8f0">메시지 히스토리</text>

  <!-- Assistant -->
  <rect x="400" y="790" width="130" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="465" y="811" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="bold">Assistant Node</text>
  <text x="465" y="828" text-anchor="middle" font-size="11" fill="#e2e8f0">LLM 추론</text>

  <!-- Tools -->
  <rect x="590" y="790" width="120" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="650" y="811" text-anchor="middle" font-size="11" fill="#10b981" font-weight="bold">Tool Node</text>
  <text x="650" y="828" text-anchor="middle" font-size="11" fill="#e2e8f0">compute_savings</text>

  <!-- End -->
  <rect x="770" y="790" width="80" height="50" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="810" y="811" text-anchor="middle" font-size="11" fill="#ef4444">__end__</text>
  <text x="810" y="828" text-anchor="middle" font-size="11" fill="#e2e8f0">응답 반환</text>

  <!-- Flow arrows -->
  <line x1="180" y1="815" x2="228" y2="815" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="815" x2="398" y2="815" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="815" x2="588" y2="815" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="710" y1="815" x2="768" y2="815" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tool loop back to assistant -->
  <path d="M 650 840 Q 650 900 465 900 Q 400 900 465 842" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="555" y="920" text-anchor="middle" font-size="10" fill="#10b981">도구 실행 후 복귀</text>

  <!-- tools_condition label -->
  <text x="540" y="808" text-anchor="middle" font-size="10" fill="#f59e0b">tools_condition</text>

  <!-- ── Legend ── -->
  <rect x="60" y="960" width="780" height="110" rx="10" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="80" y="984" font-size="12" font-weight="bold" fill="#94a3b8">핵심 구성요소</text>

  <rect x="80" y="994" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="98" y="1005" font-size="11" fill="#e2e8f0">LangChain / LangGraph</text>

  <rect x="230" y="994" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="248" y="1005" font-size="11" fill="#e2e8f0">도구 (@tool 데코레이터)</text>

  <rect x="400" y="994" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="418" y="1005" font-size="11" fill="#e2e8f0">State 관리 (TypedDict)</text>

  <rect x="570" y="994" width="12" height="12" rx="2" fill="#ec4899"/>
  <text x="588" y="1005" font-size="11" fill="#e2e8f0">AWS Bedrock (Claude)</text>

  <rect x="80" y="1018" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="98" y="1029" font-size="11" fill="#e2e8f0">StateGraph (노드·엣지 정의)</text>

  <rect x="230" y="1018" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="248" y="1029" font-size="11" fill="#e2e8f0">실행 (graph.stream)</text>

  <rect x="400" y="1018" width="12" height="12" rx="2" fill="#06b6d4"/>
  <text x="418" y="1029" font-size="11" fill="#e2e8f0">프롬프트 템플릿</text>

  <line x1="570" y1="1024" x2="600" y2="1024" stroke="#10b981" stroke-dasharray="5,3" stroke-width="1.5"/>
  <text x="608" y="1029" font-size="11" fill="#e2e8f0">도구→어시스턴트 루프백</text>

  <text x="450" y="1060" text-anchor="middle" font-size="10" fill="#4b5563">로레 반 오우덴호브 (Lore Van Oudenhove) · Medium 2024-09-06 · Claude Code로 정리</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>

</svg>
