<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="420" rx="16" fill="#ffffff"/>

  <text x="430" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Claude Opus 가격 변화 (입력 per 1M tokens)</text>

  <!-- Y axis -->
  <line x1="100" y1="60" x2="100" y2="340" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Y labels -->
  <text x="90" y="95" text-anchor="end" fill="#64748b" font-size="12">$15</text>
  <line x1="95" y1="90" x2="780" y2="90" stroke="#f1f5f9" stroke-width="1"/>
  <text x="90" y="172" text-anchor="end" fill="#64748b" font-size="12">$10</text>
  <line x1="95" y1="167" x2="780" y2="167" stroke="#f1f5f9" stroke-width="1"/>
  <text x="90" y="249" text-anchor="end" fill="#64748b" font-size="12">$5</text>
  <line x1="95" y1="244" x2="780" y2="244" stroke="#f1f5f9" stroke-width="1"/>
  <text x="90" y="326" text-anchor="end" fill="#64748b" font-size="12">$1</text>
  <line x1="95" y1="321" x2="780" y2="321" stroke="#f1f5f9" stroke-width="1"/>

  <!-- X axis -->
  <line x1="100" y1="340" x2="780" y2="340" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Bar: Opus 3 — $15 -->
  <rect x="130" y="90" width="100" height="250" rx="6" fill="#e9d5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="180" y="82" text-anchor="middle" fill="#7e22ce" font-size="13" font-weight="700">$15</text>
  <text x="180" y="360" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Opus 3</text>
  <text x="180" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">2024.03</text>

  <!-- Bar: Opus 4 — $15 -->
  <rect x="270" y="90" width="100" height="250" rx="6" fill="#e9d5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="320" y="82" text-anchor="middle" fill="#7e22ce" font-size="13" font-weight="700">$15</text>
  <text x="320" y="360" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Opus 4</text>
  <text x="320" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">2025.05</text>

  <!-- Bar: Opus 4.5 — $5 -->
  <rect x="410" y="244" width="100" height="96" rx="6" fill="#d8b4fe" stroke="#9333ea" stroke-width="1.5"/>
  <text x="460" y="236" text-anchor="middle" fill="#7e22ce" font-size="13" font-weight="700">$5</text>
  <text x="460" y="360" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Opus 4.5</text>
  <text x="460" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">2025.11</text>

  <!-- Arrow: -67% -->
  <line x1="370" y1="160" x2="410" y2="244" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="405" y="195" fill="#dc2626" font-size="12" font-weight="700">-67%</text>

  <!-- Bar: Opus 4.6 — $5 -->
  <rect x="550" y="244" width="100" height="96" rx="6" fill="#c084fc" stroke="#7c3aed" stroke-width="2"/>
  <text x="600" y="236" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="700">$5</text>
  <text x="600" y="360" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Opus 4.6</text>
  <text x="600" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">2026.02</text>

  <!-- Sonnet line (steady $3) -->
  <line x1="130" y1="276" x2="700" y2="276" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 3"/>
  <circle cx="180" cy="276" r="4" fill="#3b82f6"/>
  <circle cx="320" cy="276" r="4" fill="#3b82f6"/>
  <circle cx="460" cy="276" r="4" fill="#3b82f6"/>
  <circle cx="600" cy="276" r="4" fill="#3b82f6"/>
  <text x="715" y="280" fill="#2563eb" font-size="11" font-weight="600">Sonnet $3</text>

  <!-- Haiku line (steady $1) -->
  <line x1="130" y1="321" x2="700" y2="321" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 3"/>
  <circle cx="180" cy="321" r="4" fill="#8b5cf6"/>
  <circle cx="320" cy="321" r="4" fill="#8b5cf6"/>
  <circle cx="460" cy="321" r="4" fill="#8b5cf6"/>
  <text x="715" y="325" fill="#6d28d9" font-size="11" font-weight="600">Haiku $1</text>

  <!-- Annotation -->
  <rect x="530" y="388" width="250" height="24" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="655" y="405" text-anchor="middle" fill="#15803d" font-size="11">Batch API 적용 시 추가 50% 할인</text>
</svg>
