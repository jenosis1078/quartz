<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="480" rx="16" fill="#ffffff"/>

  <text x="450" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">ISP Environment Analysis Automation</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-size="12">Cowork + /schedule + MCP Connectors</text>

  <!-- Step 1: Schedule -->
  <rect x="40" y="90" width="160" height="90" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="118" text-anchor="middle" fill="#b45309" font-size="13" font-weight="700">/schedule</text>
  <text x="120" y="140" text-anchor="middle" fill="#78350f" font-size="11">Weekly Cron</text>
  <text x="120" y="158" text-anchor="middle" fill="#92400e" font-size="10">Mon 09:00</text>
  <text x="120" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">auto trigger</text>

  <line x1="200" y1="135" x2="238" y2="135" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="238,135 228,129 228,141" fill="#64748b"/>

  <!-- Step 2: MCP Research -->
  <rect x="240" y="80" width="180" height="110" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="330" y="108" text-anchor="middle" fill="#059669" font-size="13" font-weight="700">MCP Research</text>

  <rect x="255" y="118" width="150" height="22" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="330" y="134" text-anchor="middle" fill="#065f46" font-size="10">Web Search: tech trends</text>

  <rect x="255" y="146" width="150" height="22" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="330" y="162" text-anchor="middle" fill="#065f46" font-size="10">Competitor benchmarks</text>

  <rect x="255" y="174" width="150" height="10" rx="3" fill="#a7f3d0"/>

  <line x1="420" y1="135" x2="458" y2="135" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="458,135 448,129 448,141" fill="#64748b"/>

  <!-- Step 3: Agent Analysis -->
  <rect x="460" y="80" width="180" height="110" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="108" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">Agent Analysis</text>

  <rect x="475" y="118" width="150" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="550" y="134" text-anchor="middle" fill="#166534" font-size="10">PEST / SWOT mapping</text>

  <rect x="475" y="146" width="150" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="550" y="162" text-anchor="middle" fill="#166534" font-size="10">Key issues extraction</text>

  <rect x="475" y="174" width="150" height="10" rx="3" fill="#bbf7d0"/>

  <line x1="640" y1="135" x2="678" y2="135" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="678,135 668,129 668,141" fill="#64748b"/>

  <!-- Step 4: Output -->
  <rect x="680" y="80" width="180" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="770" y="108" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700">Output</text>

  <rect x="695" y="120" width="65" height="28" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="727" y="139" text-anchor="middle" fill="#1e40af" font-size="10">/docx</text>

  <rect x="770" y="120" width="65" height="28" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="802" y="139" text-anchor="middle" fill="#1e40af" font-size="10">/pptx</text>

  <rect x="695" y="155" width="150" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="770" y="171" text-anchor="middle" fill="#1d4ed8" font-size="10">Google Drive upload</text>

  <!-- Bottom: ISP Phase mapping -->
  <rect x="40" y="230" width="820" height="110" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="258" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">ISP Consulting Phase Mapping</text>

  <rect x="60" y="275" width="150" height="50" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="135" y="297" text-anchor="middle" fill="#92400e" font-size="12" font-weight="600">Environment Analysis</text>
  <text x="135" y="314" text-anchor="middle" fill="#b45309" font-size="10">auto-generated</text>

  <line x1="210" y1="300" x2="248" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="248,300 238,294 238,306" fill="#94a3b8"/>

  <rect x="250" y="275" width="150" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="325" y="297" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Current Analysis</text>
  <text x="325" y="314" text-anchor="middle" fill="#94a3b8" font-size="10">consultant work</text>

  <line x1="400" y1="300" x2="438" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="438,300 428,294 428,306" fill="#94a3b8"/>

  <rect x="440" y="275" width="150" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="515" y="297" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Target Model</text>
  <text x="515" y="314" text-anchor="middle" fill="#94a3b8" font-size="10">consultant work</text>

  <line x1="590" y1="300" x2="628" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="628,300 618,294 618,306" fill="#94a3b8"/>

  <rect x="630" y="275" width="150" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="705" y="297" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">Implementation Plan</text>
  <text x="705" y="314" text-anchor="middle" fill="#94a3b8" font-size="10">consultant work</text>

  <!-- Time saved indicator -->
  <rect x="40" y="370" width="820" height="90" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="100" y="400" fill="#15803d" font-size="13" font-weight="700">Before (Manual)</text>
  <rect x="220" y="388" width="300" height="18" rx="4" fill="#fecaca"/>
  <text x="370" y="401" text-anchor="middle" fill="#991b1b" font-size="10">2~3 weeks (trend research + benchmarking)</text>

  <text x="100" y="435" fill="#15803d" font-size="13" font-weight="700">After (Cowork)</text>
  <rect x="220" y="423" width="80" height="18" rx="4" fill="#bbf7d0"/>
  <text x="260" y="436" text-anchor="middle" fill="#14532d" font-size="10">auto weekly</text>
  <text x="320" y="436" fill="#16a34a" font-size="11" font-weight="600">+ consultant review 2~3 days</text>
</svg>
