<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="880" rx="20" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#1e293b" font-size="32" font-weight="700">Claude Training Architecture</text>
  <text x="600" y="88" text-anchor="middle" fill="#64748b" font-size="18">Constitutional AI + RLHF/RLAIF Pipeline</text>

  <!-- ========== Phase 0: Pre-training ========== -->
  <rect x="50" y="125" width="1100" height="135" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="80" y="160" fill="#7c3aed" font-size="17" font-weight="700">PHASE 0</text>
  <text x="175" y="160" fill="#1e293b" font-size="19" font-weight="600">Pre-training</text>

  <rect x="80" y="180" width="220" height="54" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="213" text-anchor="middle" fill="#4c1d95" font-size="16">대규모 텍스트 코퍼스</text>

  <line x1="300" y1="207" x2="380" y2="207" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="380" y="180" width="260" height="54" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="510" y="213" text-anchor="middle" fill="#4c1d95" font-size="16">Transformer 사전학습</text>

  <line x1="640" y1="207" x2="720" y2="207" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="720" y="180" width="200" height="54" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="820" y="213" text-anchor="middle" fill="#4c1d95" font-size="16">Base Model</text>

  <rect x="970" y="176" width="150" height="62" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="1045" y="203" text-anchor="middle" fill="#6d28d9" font-size="14">Next Token</text>
  <text x="1045" y="224" text-anchor="middle" fill="#6d28d9" font-size="14">Prediction</text>

  <!-- Arrow down -->
  <line x1="600" y1="260" x2="600" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== Phase 1: Supervised Learning (Constitutional AI) ========== -->
  <rect x="50" y="300" width="1100" height="170" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="80" y="338" fill="#059669" font-size="17" font-weight="700">PHASE 1</text>
  <text x="175" y="338" fill="#1e293b" font-size="19" font-weight="600">Supervised Learning — Constitutional AI</text>

  <rect x="80" y="360" width="180" height="80" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="170" y="394" text-anchor="middle" fill="#14532d" font-size="15">유해 프롬프트에</text>
  <text x="170" y="416" text-anchor="middle" fill="#14532d" font-size="15">응답 생성</text>

  <line x1="260" y1="400" x2="300" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="360" width="200" height="80" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="394" text-anchor="middle" fill="#14532d" font-size="15">헌법 원칙 기반</text>
  <text x="400" y="416" text-anchor="middle" fill="#14532d" font-size="15">자기 비평 (Critique)</text>

  <line x1="500" y1="400" x2="540" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="540" y="360" width="180" height="80" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="630" y="394" text-anchor="middle" fill="#14532d" font-size="15">응답 수정</text>
  <text x="630" y="416" text-anchor="middle" fill="#14532d" font-size="15">(Revision)</text>

  <line x1="720" y1="400" x2="760" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="760" y="360" width="190" height="80" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="855" y="394" text-anchor="middle" fill="#14532d" font-size="15">수정된 응답으로</text>
  <text x="855" y="416" text-anchor="middle" fill="#14532d" font-size="15">SL Fine-tuning</text>

  <!-- Constitution badge -->
  <rect x="990" y="355" width="140" height="90" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="1060" y="385" text-anchor="middle" fill="#15803d" font-size="14" font-weight="600">Constitution</text>
  <text x="1060" y="408" text-anchor="middle" fill="#15803d" font-size="13">23,000 words</text>
  <text x="1060" y="430" text-anchor="middle" fill="#15803d" font-size="13">(2026 ver.)</text>

  <!-- Arrow down -->
  <line x1="600" y1="470" x2="600" y2="510" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== Phase 2: RLAIF ========== -->
  <rect x="50" y="510" width="1100" height="170" rx="14" fill="#fffbeb" stroke="#fde68a" stroke-width="2"/>
  <text x="80" y="548" fill="#d97706" font-size="17" font-weight="700">PHASE 2</text>
  <text x="175" y="548" fill="#1e293b" font-size="19" font-weight="600">RLAIF — Reinforcement Learning from AI Feedback</text>

  <rect x="80" y="570" width="190" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="175" y="604" text-anchor="middle" fill="#78350f" font-size="15">응답 쌍 생성</text>
  <text x="175" y="626" text-anchor="middle" fill="#78350f" font-size="15">(Response Pairs)</text>

  <line x1="270" y1="610" x2="310" y2="610" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="310" y="570" width="200" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="604" text-anchor="middle" fill="#78350f" font-size="15">AI가 헌법 기준으로</text>
  <text x="410" y="626" text-anchor="middle" fill="#78350f" font-size="15">더 나은 응답 선택</text>

  <line x1="510" y1="610" x2="550" y2="610" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="550" y="570" width="200" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="650" y="604" text-anchor="middle" fill="#78350f" font-size="15">Preference Model</text>
  <text x="650" y="626" text-anchor="middle" fill="#78350f" font-size="15">학습 (보상 모델)</text>

  <line x1="750" y1="610" x2="790" y2="610" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="790" y="570" width="180" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="880" y="604" text-anchor="middle" fill="#78350f" font-size="15">RL Fine-tuning</text>
  <text x="880" y="626" text-anchor="middle" fill="#78350f" font-size="15">(PPO / DPO)</text>

  <!-- RLHF badge -->
  <rect x="1000" y="565" width="130" height="90" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="1065" y="598" text-anchor="middle" fill="#92400e" font-size="14" font-weight="600">+ RLHF</text>
  <text x="1065" y="620" text-anchor="middle" fill="#92400e" font-size="13">Human</text>
  <text x="1065" y="640" text-anchor="middle" fill="#92400e" font-size="13">Feedback</text>

  <!-- Arrow down -->
  <line x1="600" y1="680" x2="600" y2="720" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== Final: Deployed Model ========== -->
  <rect x="250" y="720" width="700" height="90" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="600" y="755" text-anchor="middle" fill="#1d4ed8" font-size="17" font-weight="700">DEPLOYED MODEL</text>
  <text x="600" y="785" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="600">Claude Opus 4.6 · Sonnet 4.6 · Haiku 4.5</text>

  <!-- Footer -->
  <text x="600" y="855" text-anchor="middle" fill="#64748b" font-size="14">Constitutional AI: 사람 대신 AI가 피드백 → 확장 가능한 안전성 (Scalable Oversight)</text>
</svg>
