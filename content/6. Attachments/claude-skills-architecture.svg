<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="560" rx="16" fill="#ffffff"/>

  <text x="480" y="38" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700">Claude Skills System</text>
  <text x="480" y="60" text-anchor="middle" fill="#64748b" font-size="13">Skill Loading and Execution Flow</text>

  <!-- ===== Left: Skill Sources ===== -->
  <text x="110" y="100" text-anchor="middle" fill="#475569" font-size="13" font-weight="600">Skill Sources</text>

  <rect x="30" y="115" width="160" height="65" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="110" y="140" text-anchor="middle" fill="#5b21b6" font-size="12" font-weight="600">~/.claude/skills/</text>
  <text x="110" y="158" text-anchor="middle" fill="#7c3aed" font-size="11">Global Skills</text>

  <rect x="30" y="195" width="160" height="65" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="110" y="220" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="600">.claude/skills/</text>
  <text x="110" y="238" text-anchor="middle" fill="#2563eb" font-size="11">Project Skills</text>

  <rect x="30" y="275" width="160" height="55" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="110" y="298" text-anchor="middle" fill="#475569" font-size="12" font-weight="600">.claude/commands/</text>
  <text x="110" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">Legacy (auto-migrated)</text>

  <rect x="30" y="345" width="160" height="55" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="110" y="368" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">Built-in Skills</text>
  <text x="110" y="386" text-anchor="middle" fill="#16a34a" font-size="10">/simplify /review /batch ...</text>

  <!-- Arrows to Parser -->
  <line x1="190" y1="147" x2="268" y2="220" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="268,220 258,214 260,224" fill="#64748b"/>
  <line x1="190" y1="227" x2="268" y2="230" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="268,230 258,224 258,236" fill="#64748b"/>
  <line x1="190" y1="302" x2="268" y2="240" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="268,240 258,234 260,246" fill="#64748b"/>
  <line x1="190" y1="372" x2="268" y2="255" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="268,255 258,249 260,261" fill="#64748b"/>

  <!-- ===== Center: SKILL.md Parser ===== -->
  <rect x="270" y="170" width="180" height="110" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="198" text-anchor="middle" fill="#15803d" font-size="14" font-weight="700">SKILL.md Parser</text>

  <rect x="285" y="210" width="70" height="30" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="320" y="230" text-anchor="middle" fill="#14532d" font-size="10" font-weight="600">YAML</text>

  <text x="367" y="230" text-anchor="middle" fill="#64748b" font-size="14">+</text>

  <rect x="380" y="210" width="55" height="30" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="407" y="230" text-anchor="middle" fill="#14532d" font-size="10" font-weight="600">MD</text>

  <text x="360" y="268" text-anchor="middle" fill="#64748b" font-size="10">name / description / trigger</text>

  <!-- Arrow to Trigger Matcher -->
  <line x1="450" y1="225" x2="508" y2="225" stroke="#059669" stroke-width="2"/>
  <polygon points="508,225 498,219 498,231" fill="#059669"/>

  <!-- ===== Center: Trigger Matcher ===== -->
  <rect x="510" y="155" width="180" height="140" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="183" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">Trigger Matcher</text>

  <rect x="525" y="195" width="150" height="30" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="600" y="215" text-anchor="middle" fill="#065f46" font-size="11">Auto: description match</text>

  <rect x="525" y="235" width="150" height="30" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="600" y="255" text-anchor="middle" fill="#065f46" font-size="11">Manual: /skill-name</text>

  <rect x="525" y="270" width="150" height="18" rx="4" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="600" y="283" text-anchor="middle" fill="#047857" font-size="9">$ARGUMENTS substitution</text>

  <!-- Arrow to Context Injection -->
  <line x1="690" y1="225" x2="738" y2="225" stroke="#059669" stroke-width="2"/>
  <polygon points="738,225 728,219 728,231" fill="#059669"/>

  <!-- ===== Right: Context Injection ===== -->
  <rect x="740" y="160" width="190" height="130" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="835" y="188" text-anchor="middle" fill="#b45309" font-size="14" font-weight="700">Context Injection</text>

  <rect x="755" y="200" width="160" height="28" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="835" y="219" text-anchor="middle" fill="#78350f" font-size="11">Skill Instructions load</text>

  <rect x="755" y="236" width="160" height="28" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="835" y="255" text-anchor="middle" fill="#78350f" font-size="11">CLAUDE.md context merge</text>

  <rect x="755" y="272" width="160" height="10" rx="3" fill="#fde68a"/>
  <text x="835" y="280" text-anchor="middle" fill="#92400e" font-size="8">send to Agent Loop</text>

  <!-- Arrow down to Execution -->
  <line x1="835" y1="290" x2="835" y2="338" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="835,338 829,328 841,328" fill="#64748b"/>

  <!-- ===== Bottom: Execution Flow ===== -->
  <rect x="250" y="340" width="660" height="70" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="580" y="368" text-anchor="middle" fill="#334155" font-size="15" font-weight="700">Agent Execution</text>
  <text x="580" y="390" text-anchor="middle" fill="#64748b" font-size="12">Think &gt; Plan &gt; Execute Tools &gt; Evaluate &gt; Iterate &gt; Output</text>
  <text x="580" y="404" text-anchor="middle" fill="#94a3b8" font-size="10">Hooks (PreToolUse / PostToolUse) fire around each tool call</text>

  <!-- ===== Bottom: Skill Categories ===== -->
  <text x="480" y="445" text-anchor="middle" fill="#475569" font-size="13" font-weight="600">Built-in Skill Categories</text>

  <rect x="50" y="460" width="115" height="45" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="107" y="480" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">/simplify</text>
  <text x="107" y="496" text-anchor="middle" fill="#64748b" font-size="9">code quality</text>

  <rect x="180" y="460" width="100" height="45" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="230" y="480" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">/commit</text>
  <text x="230" y="496" text-anchor="middle" fill="#64748b" font-size="9">git workflow</text>

  <rect x="295" y="460" width="100" height="45" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="345" y="480" text-anchor="middle" fill="#5b21b6" font-size="11" font-weight="600">/review</text>
  <text x="345" y="496" text-anchor="middle" fill="#64748b" font-size="9">code review</text>

  <rect x="410" y="460" width="100" height="45" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="460" y="480" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">/batch</text>
  <text x="460" y="496" text-anchor="middle" fill="#64748b" font-size="9">parallel run</text>

  <rect x="525" y="460" width="100" height="45" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="575" y="480" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="600">/loop</text>
  <text x="575" y="496" text-anchor="middle" fill="#64748b" font-size="9">recurring</text>

  <rect x="640" y="460" width="100" height="45" rx="8" fill="#fecaca" stroke="#f87171" stroke-width="1"/>
  <text x="690" y="480" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="600">/debug</text>
  <text x="690" y="496" text-anchor="middle" fill="#64748b" font-size="9">debugging</text>

  <rect x="755" y="460" width="120" height="45" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="815" y="480" text-anchor="middle" fill="#0369a1" font-size="11" font-weight="600">/claude-api</text>
  <text x="815" y="496" text-anchor="middle" fill="#64748b" font-size="9">API support</text>

  <!-- Footer -->
  <text x="480" y="540" text-anchor="middle" fill="#94a3b8" font-size="11">Custom Skills: ~/.claude/skills/SKILL.md or .claude/skills/SKILL.md</text>
</svg>
